<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latin Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0f0f0f;color:#fff;}

/* WELCOME */
.welcome{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#0f0f0f;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
z-index:999;
text-align:center;
padding:20px;
}
.welcome button{
margin:6px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#ff0000;
color:#fff;
cursor:pointer;
width:200px;
}

/* HEADER */
.header{
position:sticky;top:0;
background:rgba(15,15,15,0.95);
padding:15px;
text-align:center;
font-weight:600;
z-index:10;
}

/* CONTENEDOR */
.container{
padding:20px;
max-width:1200px;
margin:auto;
}

/* SECCIÓN */
.section{margin-bottom:40px;}
.section h3{
margin-bottom:15px;
font-size:18px;
border-left:4px solid #ff0000;
padding-left:10px;
}

/* CARRUSEL */
.carousel{
overflow:hidden;
position:relative;
}
.track{
display:flex;
gap:15px;
will-change:transform;
}







/* CARD */
.card{
min-width:180px;
background:#1c1c1c;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
flex-shrink:0;
}
.card:hover{transform:scale(1.05);}
.card img{
width:100%;
height:160px;
object-fit:cover;
}

/* INFO */
.info{padding:12px;}
.info p{font-size:14px;}
.info span{font-size:12px;opacity:0.7;}
.price{
margin-top:6px;
font-weight:600;
color:#00ffae;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}
.modal-content{
background:#1c1c1c;
padding:20px;
border-radius:20px;
width:90%;
max-width:420px;
text-align:center;
}
.modal img{
width:100%;
border-radius:12px;
margin-bottom:15px;
}
.price-big{
font-size:28px;
font-weight:700;
margin-top:10px;
}
.btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff0000,#ff4d4d);
color:#fff;
font-weight:600;
cursor:pointer;
}

/* RESPONSIVE */
@media(min-width:768px){
.card{min-width:220px;}
}
@media(min-width:1024px){
.card{min-width:250px;}
}
</style>
</head>

<audio id="bgMusic" loop>
  <source src="" type="audio/mpeg">
</audio>

<body>

<!-- WELCOME -->
<div class="welcome" id="welcome">
<h2>BIENVENIDOS A LATIN STORE</h2>
<p>Selecciona tu moneda</p>

<button onclick="setCurrency('USD',1)">U$ = Dolares</button>
<button onclick="setCurrency('C$',37.5)">C$ = Cordobas</button>
<button onclick="setCurrency('₡',525)">₡ = Colones</button>
<button onclick="setCurrency('MXN',18.31)">$ = Peso MX</button>
<button onclick="setCurrency('€',1.0)">€ = Euro</button>
</div>

<div class="header">MEMBRESIAS DISPONIBLES</div>

<div class="container" id="store"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImg">
<h3 id="modalTitle"></h3>
<p id="modalText"></p>
<div id="modalPrice"></div>
<button class="btn" onclick="buyNow()">Contratar ahora</button>
</div>
</div>

<script>
let currency='USD';
let rate=1;
let selected=null;

const products=[

{name:'Tele-Latino',plan:'1 mes',cat:'6 Dispositivos',price:7.18,img:'img/TL1MES.png'},
{name:'Tele-Latino',plan:'2 meses',cat:'6 Dispositivos',price:14.36,img:'img/TL2MESES.png'},

{name:'Tele-Latino',plan:'6 meses',cat:'6 Dispositivos',price:40.20,img:'img/TL6MESES.png'},
{name:'Tele-Latino',plan:'9 meses',cat:'6 Dispositivos',price:55.00,img:'img/TL9MESES.png'},

{name:'Tele-Latino',plan:'1 mes',cat:'1 Dispositivos',price:4.05,img:'img/TLXCONEXION1MES.png'},
{name:'Tele-Latino',plan:'3 meses',cat:'1 Dispositivos',price:12.15,img:'img/TLXCONEXION3MESES.png'},
{name:'Tele-Latino',plan:'6 meses',cat:'1 Dispositivos',price:24.30,img:'img/TLXCONEXION6MESES.png'},
{name:'Tele-Latino',plan:'12 meses',cat:'1 Dispositivos',price:48.60,img:'img/TLXCONEXION12MESES.png'},

{name:'GravicsoTV',plan:'1 mes',cat:'3 Dispositivos',price:10.00,img:'img/GVS1MES.png'},
{name:'GravicsoTV',plan:'2 meses',cat:'3 Dispositivos',price:20.00,img:'img/GVS2MESES.png'},
{name:'GravicsoTV',plan:'3 meses',cat:'3 Dispositivos',price:30.00,img:'img/GVS3MESES.png'},
{name:'GravicsoTV',plan:'6 meses',cat:'3 Dispositivos',price:60.00,img:'img/GVS6MESES.png'},
{name:'GravicsoTV',plan:'9 meses',cat:'3 Dispositivos',price:70.00,img:'img/GVS9MESES.png'},
{name:'GravicsoTV',plan:'12 meses',cat:'3 Dispositivos',price:90.00,img:'img/GVS12MESES.png'},

{name:'GravicsoTV',plan:'1 mes',cat:'1 Dispositivos',price:5.00,img:'img/GVSXCONEXION1MES.png'},
{name:'GravicsoTV',plan:'3 meses',cat:'1 Dispositivos',price:15.00,img:'img/GVSXCONEXION3MESES.png'},
{name:'GravicsoTV',plan:'6 meses',cat:'1 Dispositivos',price:30.00,img:'img/GVSXCONEXION6MESES.png'},
{name:'GravicsoTV',plan:'12 meses',cat:'1 Dispositivos',price:60.00,img:'img/GVSXCONEXION12MESES.png'},

{name:'Veltix',plan:'1 mes',cat:'3 Dispositivos',price:9.00,img:'img/VLT1MES.png'},
{name:'Veltix',plan:'2 meses',cat:'3 Dispositivos',price:18.00,img:'img/VLT2MESES.png'},
{name:'Veltix',plan:'3 meses',cat:'3 Dispositivos',price:26.00,img:'img/VLT3MESES.png'},
{name:'Veltix',plan:'6 meses',cat:'3 Dispositivos',price:48.00,img:'img/VLT6MESES.png'},
{name:'Veltix',plan:'9 meses',cat:'3 Dispositivos',price:70.00,img:'img/VLT9MESES.png'},
{name:'Veltix',plan:'12 meses',cat:'3 Dispositivos',price:85.00,img:'img/VLT12MESES.png'},

{name:'Veltix',plan:'1 mes',cat:'1 Dispositivos',price:4.50,img:'img/VLTXCONEXION1MES.png'},
{name:'Veltix',plan:'3 meses',cat:'1 Dispositivos',price:13.00,img:'img/VLTXCONEXION3MESES.png'},
{name:'Veltix',plan:'6 meses',cat:'1 Dispositivos',price:26.00,img:'img/VLTXCONEXION6MESES.png'},
{name:'Veltix',plan:'12 meses',cat:'1 Dispositivos',price:54.00,img:'img/VLTXCONEXION12MESES.png'},
];

function format(p){return currency+' '+p.toFixed(2);}


// Editado 

//function setCurrency(c,r){
//currency=c;rate=r;
//document.getElementById('welcome').style.display='none';
//loadProducts();
//}
 
function setCurrency(c,r){
  currency = c;
  rate = r;

  document.getElementById('welcome').style.display='none';

  // 🔊 INICIAR MÚSICA
  const music = document.getElementById('bgMusic');
  music.volume = 0.5; // opcional (0 a 1)
  music.play().catch(()=>{}); // evita errores del navegador

  loadProducts();
}











function loadProducts(){
let sections={};

products.forEach((p,i)=>{
if(!sections[p.name]) sections[p.name]=[];
sections[p.name].push({...p,index:i});
});

let html='';

for(let s in sections){
html+=`
<div class="section">
<h3>${s}</h3>
<div class="carousel">
<div class="track" id="track-${s}">
`;

sections[s].forEach(p=>{
let price=p.price*rate;
html+=`
<div class="card" onclick="openModal(${p.index})">
<img src="${p.img}">
<div class="info">
<p>${p.plan}</p>
<span>${p.cat}</span>
<div class="price">${format(price)}</div>
</div>
</div>
`;
});

html+=`</div></div></div>`;
}

document.getElementById('store').innerHTML=html;

  // nuevo cambio

document.querySelectorAll('.track').forEach(track => {

  // DUPLICA CONTENIDO PARA LOOP REAL
  track.innerHTML += track.innerHTML;

  let pos = 0;
  let speed = 0.4;
  let isPaused = false;

  function animate(){
    if(!isPaused){
      pos -= speed;
      track.style.transform = `translateX(${pos}px)`;

      // 🔥 LOOP PERFECTO
      if(Math.abs(pos) >= track.scrollWidth / 2){
        pos = 0;
      }
    }

    requestAnimationFrame(animate);
  }

  animate();

  // 🛑 PAUSA EN HOVER (PC)
  track.addEventListener('mouseenter', () => isPaused = true);
  track.addEventListener('mouseleave', () => isPaused = false);

  // 📱 PAUSA EN TOUCH (MÓVIL)
  track.addEventListener('touchstart', () => isPaused = true);
  track.addEventListener('touchend', () => isPaused = false);

});


}

function openModal(i){
selected=products[i];
document.getElementById('modal').style.display='flex';

let price=selected.price*rate;

document.getElementById('modalTitle').innerText = selected.name;
document.getElementById('modalText').innerText =
`${selected.plan} - ${selected.cat}`;

document.getElementById('modalImg').src = selected.img;
document.getElementById('modalPrice').innerHTML =
`<div class="price-big">${format(price)}</div>`;
}

function buyNow(){
let now=new Date().toLocaleString();
let price=selected.price*rate;

let msg=`Hola, Me Gustaria realizar la siguiente compra.

✨*Producto seleccionado*🔥
• Artículo: ${selected.name}
• membresía: ${selected.plan}
• Categoría: ${selected.cat}
• Precio estándar: ${format(price)}
• Descuento: ${format(0)}
• Precio Final: ${format(price)}
• Hora de orden: ${now}

Quedo atento a los pasos para completar la compra.`;

window.open(`https://wa.me/50588581031?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
