<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latin Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0f0f0f;color:#fff;}

/* BIENVENIDA */
.welcome{
position:fixed;width:100%;height:100%;
background:#0f0f0f;display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:999;
text-align:center;
}
.welcome button{
margin:5px;padding:10px 20px;border:none;
border-radius:10px;background:#ff0000;color:#fff;cursor:pointer;
}

/* HEADER */
.header{
position:sticky;top:0;
background:rgba(15,15,15,0.9);
backdrop-filter:blur(10px);
padding:15px;text-align:center;font-weight:600;
}

/* GRID */
.container{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;}

/* CARD */
.card{background:#1c1c1c;border-radius:18px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:160px;object-fit:cover;transition:0.5s;}
.card:hover img{transform:scale(1.1);}

.info{padding:12px;}
.info p{font-size:13px;opacity:0.8;}
.info span{display:block;margin-top:5px;font-weight:600;}

.btn{
margin-top:8px;width:100%;padding:8px;border:none;
border-radius:12px;background:#ff0000;color:#fff;cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;align-items:center;justify-content:center;
z-index:100;
}

.modal-content{
background:#1c1c1c;
padding:20px;
border-radius:20px;
max-width:400px;
width:90%;
text-align:center;
}

.modal img{
width:100%;
border-radius:12px;
margin-bottom:15px;
}

.close{
position:absolute;top:20px;right:20px;
font-size:25px;cursor:pointer;
}

/* NAV ORIGINAL RESTAURADO */
.nav{
position:fixed;bottom:15px;left:50%;transform:translateX(-50%);
width:90%;background:#1c1c1c;border-radius:25px;
display:flex;justify-content:space-around;padding:10px;
}
</style>
</head>

<body>

<!-- BIENVENIDA -->
<div class="welcome" id="welcome">
<h2>BIENVENIDOS A LATIN STORE</h2>
<p></p>
<p>Selecciona tu moneda</p>
<p></p>

<button onclick="setCurrency('USD',1)"> U$ = Dolares</button>
<button onclick="setCurrency('C$',37.5)"> C$ = Cordobas</button>
<button onclick="setCurrency('₡',525)"> ₡ = Colones</button>
<button onclick="setCurrency('$',17.31)">MXN = Pesos Mexicano</button>
<button onclick="setCurrency('€',1.2)"> € = EURO</button>
</div>

<div class="header">MEMBRESIAS DISPONIBLES</div>

<div class="container">
<div class="grid" id="products"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="close" onclick="closeModal()">✖</div>

<div class="modal-content">
<img id="modalImg">
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
<br>
<button class="btn" onclick="buyNow()">Contratar ahora</button>
</div>
</div>

<!-- 🔥 NAV ORIGINAL -->
<div class="nav">
<div>Inicio</div>
<div>Buscar</div>
<div>Favoritos</div>
<div>Perfil</div>
</div>

<script>

let rate=1;

const products=[

];

function format(p){return currency+' '+p.toFixed(2);}

function setCurrency(c,r){
currency=c;rate=r;
document.getElementById('welcome').style.display='none';
loadProducts();
}

function loadProducts(){
let html='';
products.forEach((p,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${p.img}">
<div class="info">
<p>${p.name}</p>
<span>${p.plan} - ${p.cat}</span>
<button class="btn">Ver</button>
</div>
</div>`;
});
document.getElementById('products').innerHTML=html;
}

let selected;

function openModal(i){
selected=products[i];
document.getElementById('modal').style.display='flex';

let price=selected.price*rate;

document.getElementById('modalTitle').innerText=selected.name;
document.getElementById('modalImg').src=selected.img;

document.getElementById('modalDesc').innerHTML=`
• Membresía: ${selected.plan}<br>
• Categoría: ${selected.cat}<br><br>
• Precio: <b>${format(price)}</b>
`;
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function buyNow(){
let now=new Date().toLocaleString();
let price=selected.price*rate;

let msg=`Hola, Me Gustaria realizar la siguiente compra.

• Artículo: ${selected.name}
• membresía: ${selected.plan}
• Categoría: ${selected.cat}
• Precio estándar: ${format(price)}
• Descuento: ${format(0)}
• Precio Final: ${format(price)}
• Hora de orden: ${now}

Quedo atento a los pasos para completar la compra.`;

window.open(`https://wa.me/50588581031?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
